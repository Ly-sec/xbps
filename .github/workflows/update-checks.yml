name: Check package updates

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

concurrency:
  group: update-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-updates:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run update scripts
        id: updates
        run: |
          for script in pkgs/*/update; do
            [ -f "$script" ] || continue
            pkg="$(basename "$(dirname "$script")")"
            echo "Checking $pkg..."
            bash "$script" | tee -a updates-output.txt
          done

      - name: Create issue for updates
        if: always()
        run: |
          grep "^UPDATE:" updates-output.txt 2>/dev/null > update-lines.txt || true

          if [ ! -s update-lines.txt ]; then
            echo "No package updates found."
            exit 0
          fi

          ISSUE_BODY="## Package updates available

          | Package | Current | Latest | Checksum |
          |---------|---------|--------|----------|
          "

          while IFS='|' read -r _ pkg current latest cksum1 cksum2; do
            if [ -n "$cksum2" ]; then
              ISSUE_BODY+="| $pkg | $current | $latest | x86_64: \`$cksum1\` / aarch64: \`$cksum2\` |\n"
            elif [ -n "$cksum1" ]; then
              ISSUE_BODY+="| $pkg | $current | $latest | \`$cksum1\` |\n"
            else
              ISSUE_BODY+="| $pkg | $current | $latest | (unknown) |\n"
            fi
          done < update-lines.txt

          ISSUE_BODY+="
          ### Dependency changes

          Not determined automatically. Build and verify with \`xbps-src show-rdeps\`.
          "

          EXISTING_ISSUE=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "update-check" \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING_ISSUE" ]; then
            gh issue update "$EXISTING_ISSUE" \
              --repo "${{ github.repository }}" \
              --title "Package updates available ($(date +%Y-%m-%d))" \
              --body "$ISSUE_BODY" 2>/dev/null || true
          else
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "Package updates available ($(date +%Y-%m-%d))" \
              --body "$ISSUE_BODY" \
              --label "update-check" 2>/dev/null || true
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
