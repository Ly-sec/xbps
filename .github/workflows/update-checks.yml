name: Check package updates

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: update-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-updates:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Install git and checkout repository
        run: |
          xbps-install -Sy git
          git clone --depth=1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git "$GITHUB_WORKSPACE"

      - name: Prepare container
        run: |
          xbps-install -Syu xbps
          xbps-install -y sudo bash git curl
          useradd -G xbuilder -M builder
          git config --global --add safe.directory '*'

      - name: Setup void-packages
        run: |
          git clone --depth=1 https://github.com/void-linux/void-packages.git /void-packages
          cd /void-packages
          echo XBPS_BUILD_ENVIRONMENT=void-packages-ci >> etc/conf
          echo XBPS_CHROOT_CMD=uchroot >> etc/conf
          echo XBPS_ALLOW_RESTRICTED=yes >> etc/conf
          chown -R builder:xbuilder .

          # Copy pkgs as overlays for update-check
          for pkgdir in "$GITHUB_WORKSPACE/pkgs/"*/; do
            [ -d "$pkgdir" ] || continue
            [ -f "$pkgdir/template" ] || continue
            pkg="$(basename "$pkgdir")"
            dst="srcpkgs/$pkg"
            rm -rf "$dst"
            mkdir -p "$dst"
            cp "$pkgdir/template" "$dst/template"
          done
          sudo -Eu builder ./xbps-src binary-bootstrap

      - name: Run update checks and commit
        run: |
          cd /void-packages

          for pkgdir in "$GITHUB_WORKSPACE/pkgs/"*/; do
            [ -d "$pkgdir" ] || continue
            [ -f "$pkgdir/template" ] || continue
            pkg="$(basename "$pkgdir")"

            # Git-based packages (version=0) use their custom update script
            if grep -q '^version=0$' "$pkgdir/template" && [ -f "$pkgdir/update" ]; then
              echo "Checking $pkg via update script..."
              OLD_VER=$(grep '^version=' "$pkgdir/template" | head -1 | cut -d= -f2)
              (cd "$pkgdir" && sh ./update)
              NEW_VER=$(grep '^version=' "$pkgdir/template" | head -1 | cut -d= -f2)
              if [ "$OLD_VER" != "$NEW_VER" ] && [ -n "$NEW_VER" ]; then
                echo "=> $pkg: $OLD_VER -> $NEW_VER"
                echo "UPDATE:$pkg|$OLD_VER|$NEW_VER" >> "$GITHUB_WORKSPACE/updates.txt"
              fi
              continue
            fi

            # Standard packages use xbps-src update-check
            echo "Checking $pkg via xbps-src update-check..."
            UPDATE=$(sudo -Eu builder sh -c "cd /void-packages && ./xbps-src update-check $pkg 2>/dev/null" | tail -1 || true)
            echo "$UPDATE" | grep -q ' -> ' || continue

            OLD_VER=$(echo "$UPDATE" | awk -F' -> ' '{print $1}' | rev | cut -d- -f1 | rev)
            NEW_VER=$(echo "$UPDATE" | awk -F' -> ' '{print $2}' | rev | cut -d- -f1 | rev | tr -d '\n\r')
            [ -z "$NEW_VER" ] && continue
            [ "$OLD_VER" = "$NEW_VER" ] && continue

            echo "=> $pkg: $OLD_VER -> $NEW_VER"
            echo "UPDATE:$pkg|$OLD_VER|$NEW_VER" >> "$GITHUB_WORKSPACE/updates.txt"
          done

          # Commit any updates
          cd "$GITHUB_WORKSPACE"

          if [ ! -f updates.txt ]; then
            echo "No updates found."
            exit 0
          fi

          git config user.name "Ly-sec"
          git config user.email "void@lysec.dev"

          while IFS='|' read -r pkg current latest; do
            pkg="${pkg#UPDATE:}"
            echo "Processing $pkg: $current -> $latest"

            template="pkgs/$pkg/template"
            sed -i "s/^version=.*/version=$latest/" "$template"
            sed -i "s/^revision=.*/revision=1/" "$template"

            if grep -q '^distfiles=' "$template"; then
              mkdir -p "/void-packages/srcpkgs/$pkg"
              cp "$template" "/void-packages/srcpkgs/$pkg/template"
              chown builder:builder "/void-packages/srcpkgs/$pkg/template"
              if sudo -Eu builder sh -c "cd /void-packages && xgensum -i srcpkgs/$pkg/template" 2>/dev/null; then
                cp "/void-packages/srcpkgs/$pkg/template" "$template"
                echo "=> $pkg checksums regenerated"
              fi
            fi

            git add "$template"
          done < updates.txt

          git diff --cached --quiet && { echo "No changes to commit."; exit 0; }

          git commit -m "chore(pkgs): auto-update packages"
          git push
