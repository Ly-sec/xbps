name: Build packages

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches:
      - main
    paths:
      - 'pkgs/**'
      - '.github/workflows/build.yml'
      - 'scripts/generate-index.sh'
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish signed packages to GitHub Releases'
        required: false
        default: false
        type: boolean

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  XBPS_ALLOW_RESTRICTED: yes

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged
    timeout-minutes: 120
    outputs:
      packages_built: ${{ steps.build.outputs.packages_built }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Prepare container
        run: |
          xbps-install -Syu xbps
          xbps-install -y sudo bash git curl
          useradd -G xbuilder -M builder
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Setup void-packages
        run: |
          git clone --depth=1 https://github.com/void-linux/void-packages.git /void-packages
          cd /void-packages
          echo XBPS_BUILD_ENVIRONMENT=void-packages-ci >> etc/conf
          echo XBPS_CHROOT_CMD=uchroot >> etc/conf
          echo XBPS_ALLOW_RESTRICTED=yes >> etc/conf
          chown -R builder:xbuilder .

      - name: Restore cached repository packages
        id: cache-repo
        uses: actions/cache@v4
        with:
          path: repo
          key: repo-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            repo-${{ github.ref_name }}-

      - name: Build packages
        id: build
        shell: bash
        run: |
          cd /void-packages

          # Copy overlays
          for pkgdir in "$GITHUB_WORKSPACE/pkgs/"*/; do
            [ -d "$pkgdir" ] || continue
            [ -f "$pkgdir/template" ] || continue
            pkg="$(basename "$pkgdir")"
            dst="srcpkgs/$pkg"
            rm -rf "$dst"
            mkdir -p "$dst"
            cp "$pkgdir/template" "$dst/template"
            for extra in INSTALL REMOVE patches files update options; do
              [ -e "$pkgdir/$extra" ] && cp -r "$pkgdir/$extra" "$dst/"
            done
          done

          # Symlink subpackages
          for pkgdir in "$GITHUB_WORKSPACE/pkgs/"*/; do
            [ -f "$pkgdir/template" ] || continue
            base=$(basename "$pkgdir")
            while IFS= read -r line; do
              case "$line" in
                *_package\(\)*)
                  sub=$(echo "$line" | sed 's/^[[:space:]]*//; s/_package().*//')
                  [ -n "$sub" ] && [ "$sub" != "$base" ] && [ ! -e "srcpkgs/$sub" ] && ln -s "$base" "srcpkgs/$sub"
                  ;;
              esac
            done < "$pkgdir/template"
          done

          # Custom shlibs
          if [ -f "$GITHUB_WORKSPACE/pkgs/common/shlibs" ]; then
            cat "$GITHUB_WORKSPACE/pkgs/common/shlibs" >> common/shlibs
          fi

          # Run update scripts for git-based packages (version=0)
          for pkgdir in "$GITHUB_WORKSPACE/pkgs/"*/; do
            [ -f "$pkgdir/update" ] && grep -q '^version=0$' "$pkgdir/template" && {
              echo "Running update for $(basename "$pkgdir")..."
              (cd "$pkgdir" && sh ./update)
              cp "$pkgdir/template" "srcpkgs/$(basename "$pkgdir")/template"
            }
          done

          # Bootstrap
          sudo -Eu builder ./xbps-src binary-bootstrap

          # Detect changed packages
          BEFORE="${{ github.event.before }}"
          REBUILD_ALL=false
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            REBUILD_ALL=true
          fi
          if [ "$REBUILD_ALL" = "false" ] && ! git -C "$GITHUB_WORKSPACE" merge-base --is-ancestor "$BEFORE" HEAD 2>/dev/null; then
            REBUILD_ALL=true
          fi
          CACHE_RESTORED=false
          if [ -d "$GITHUB_WORKSPACE/repo" ] && ls "$GITHUB_WORKSPACE/repo"/*.xbps >/dev/null 2>&1; then
            CACHE_RESTORED=true
          fi
          if [ "$REBUILD_ALL" = "false" ] && [ "$CACHE_RESTORED" = "false" ]; then
            REBUILD_ALL=true
          fi

          WORKSPACE="$GITHUB_WORKSPACE"
          if [ "$REBUILD_ALL" = "true" ]; then
            for d in "$WORKSPACE/pkgs/"*/; do
              [ -f "$d/template" ] && basename "$d"
            done | sort > changed-packages.txt
          else
            > changed-packages.txt
            git -C "$WORKSPACE" diff --name-only "$BEFORE"...HEAD -- pkgs/*/template \
              | sed 's|/template$||' | while read -r p; do basename "$p"; done >> changed-packages.txt
            git -C "$WORKSPACE" diff --name-only HEAD -- pkgs/*/template \
              | sed 's|/template$||' | while read -r p; do basename "$p"; done >> changed-packages.txt
            if [ "$CACHE_RESTORED" = "true" ]; then
              for d in "$WORKSPACE/pkgs/"*/; do
                [ -f "$d/template" ] || continue
                pkg=$(basename "$d")
                ver=$(grep -E '^version=' "$d/template" | head -1 | sed 's/^version=//')
                rev=$(grep -E '^revision=' "$d/template" | head -1 | sed 's/^revision=//')
                pkgver="${ver}_${rev}"
                found=false
                for search_dir in "$WORKSPACE/repo" "$WORKSPACE/repo/nonfree"; do
                  [ -d "$search_dir" ] && ls "${search_dir}/${pkg}-${pkgver}"*.xbps >/dev/null 2>&1 && found=true && break
                done
                [ "$found" = false ] && echo "$pkg" >> changed-packages.txt
              done
            fi
            sort -u changed-packages.txt -o changed-packages.txt
          fi

          # Resolve custom package dependencies
          declare -A BASE_PKG
          for d in "$WORKSPACE/pkgs/"*/; do
            [ -f "$d/template" ] || continue
            base=$(basename "$d")
            BASE_PKG["$base"]="$base"
            while IFS= read -r line; do
              case "$line" in
                *_package\(\)*)
                  sub=$(echo "$line" | sed 's/^[[:space:]]*//; s/_package().*//')
                  [ -n "$sub" ] && [ "$sub" != "$base" ] && BASE_PKG["$sub"]="$base"
                  ;;
              esac
            done < "$d/template"
          done
          while true; do
            ADDED=false
            while IFS= read -r pkg; do
              [ -z "$pkg" ] && continue
              template="$WORKSPACE/pkgs/$pkg/template"
              [ -f "$template" ] || continue
              awk '/^makedepends=/ { sub(/^makedepends=/, ""); if (/^"/ && /"$/) { gsub(/"/, ""); print; next } if (/^"/) { sub(/^"/, ""); buf = $0; in_block = 1; next } } in_block { if (/"$/) { sub(/"$/, ""); print buf " " $0; in_block = 0 } else { buf = buf " " $0 } }' "$template" 2>/dev/null | while IFS= read -r deps; do
                for dep in $deps; do
                  dep=$(echo "$dep" | xargs)
                  [ -z "$dep" ] && continue
                  base="${BASE_PKG[$dep]:-}"
                  [ -z "$base" ] && continue
                  grep -qxF "$base" changed-packages.txt 2>/dev/null && continue
                  echo "$base" >> changed-packages.txt
                  ADDED=true
                done
              done
            done < changed-packages.txt
            sort -u changed-packages.txt -o changed-packages.txt
            [ "$ADDED" = "false" ] && break
          done

          echo "Packages to build:"
          cat changed-packages.txt

          # Build
          XBPS_MAKEJOBS=$(nproc)
          FAILED=()
          while IFS= read -r pkg; do
            [ -z "$pkg" ] && continue
            if ! sudo -Eu builder ./xbps-src -j "$XBPS_MAKEJOBS" pkg "$pkg" 2>&1; then
              echo "::error::Build failed for $pkg"
              FAILED+=("$pkg")
            fi
          done < changed-packages.txt
          [ ${#FAILED[@]} -gt 0 ] && { echo "Failed: ${FAILED[*]}"; exit 1; }

          # Collect packages
          mkdir -p "$WORKSPACE/repo"
          BINPKGS="hostdir/binpkgs"
          for f in "$BINPKGS"/*.xbps; do
            [ -f "$f" ] && cp "$f" "$WORKSPACE/repo/"
          done
          [ -d "$BINPKGS/nonfree" ] && {
            mkdir -p "$WORKSPACE/repo/nonfree"
            for f in "$BINPKGS/nonfree"/*.xbps; do
              [ -f "$f" ] && cp "$f" "$WORKSPACE/repo/nonfree/"
            done
          }
          PKGS_BUILT=false
          for dir in "$WORKSPACE/repo" "$WORKSPACE/repo/nonfree"; do
            [ -d "$dir" ] && ls "$dir"/*.xbps >/dev/null 2>&1 && {
              xbps-rindex -a "$dir"/*.xbps 2>/dev/null
              PKGS_BUILT=true
            }
          done
          [ "$PKGS_BUILT" = "true" ] && echo "packages_built=true" >> "$GITHUB_OUTPUT" \
            || echo "packages_built=false" >> "$GITHUB_OUTPUT"

      - name: Sign repository
        if: steps.build.outputs.packages_built == 'true'
        shell: bash
        env:
          XBPS_PRIVKEY: ${{ secrets.XBPS_PRIVKEY }}
          XBPS_PUBKEY: ${{ secrets.XBPS_PUBKEY }}
          XBPS_SIGNEDBY: ${{ secrets.XBPS_SIGNEDBY }}
        run: |
          HAS_MAIN=$(ls repo/*.xbps 2>/dev/null | head -1)
          HAS_NONFREE=$(ls repo/nonfree/*.xbps 2>/dev/null | head -1)
          [ -z "$HAS_MAIN" ] && [ -z "$HAS_NONFREE" ] && { echo "No packages"; exit 1; }
          [ -z "$XBPS_SIGNEDBY" ] && { echo "XBPS_SIGNEDBY not set"; exit 1; }

          mkdir -p keys
          if [ -n "$XBPS_PUBKEY" ]; then
            if echo "$XBPS_PUBKEY" | grep -q "^-----BEGIN"; then
              echo "$XBPS_PUBKEY" > keys/pub.pem
            elif [ -f "$XBPS_PUBKEY" ]; then
              cp "$XBPS_PUBKEY" keys/pub.pem
            fi
          fi

          KEY_ARG=""
          if [ -n "$XBPS_PRIVKEY" ]; then
            if echo "$XBPS_PRIVKEY" | grep -q "^-----BEGIN"; then
              TMP_KEY=$(mktemp /tmp/xbps-privkey.XXXXXXXXXX.pem)
              trap 'rm -f "$TMP_KEY"' EXIT
              echo "$XBPS_PRIVKEY" > "$TMP_KEY"
              chmod 600 "$TMP_KEY"
              KEY_ARG="--privkey $TMP_KEY"
            elif [ -f "$XBPS_PRIVKEY" ]; then
              KEY_ARG="--privkey $XBPS_PRIVKEY"
            fi
          fi

          SIGN_CMD=(xbps-rindex --sign --signedby "$XBPS_SIGNEDBY")
          [ -n "$KEY_ARG" ] && SIGN_CMD+=(--privkey "${KEY_ARG#--privkey }")
          
          # Sign individual packages
          for dir in repo repo/nonfree; do
            [ -d "$dir" ] || continue
            pkgs=("$dir"/*.xbps)
            [ -f "${pkgs[0]}" ] || continue
            echo "Signing packages in $dir..."
            xbps-rindex --sign-pkg --signedby "$XBPS_SIGNEDBY" ${KEY_ARG} "${pkgs[@]}"
          done
          
          "${SIGN_CMD[@]}" repo
          [ -d repo/nonfree ] && xbps-rindex --sign --signedby "$XBPS_SIGNEDBY" ${KEY_ARG} repo/nonfree 2>/dev/null || true

      - name: Prepare Pages artifact
        run: |
          rm -rf public
          mkdir -p public/keys
          cp -a repo/. public/ 2>/dev/null || true
          [ -f keys/pub.pem ] && cp keys/pub.pem public/keys/pub.pem
          touch public/.nojekyll
          bash scripts/generate-index.sh public

      - name: Upload built repository artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xbps-repo-${{ github.run_number }}
          path: |
            repo/*.xbps
            repo/*.sig*
            repo/*.fdb*
            repo/*.flist*
            repo/nonfree/*.xbps
            repo/nonfree/*.sig*
            repo/nonfree/*.fdb*
            repo/nonfree/*.flist*
            keys/pub.pem
          if-no-files-found: warn

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Publish to GitHub Releases
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="repo-$(date +%Y%m%d)-$(git rev-parse --short HEAD)"
          gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null && \
            gh release delete "$TAG" --repo "${{ github.repository }}" --yes 2>/dev/null || true
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Package repository $TAG" \
            --notes "Automated build from commit $(git rev-parse --short HEAD)." \
            repo/*.xbps repo/*.sig* 2>/dev/null || true
          for f in repo/*.fdb repo/*.flist; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --repo "${{ github.repository }}" 2>/dev/null || true
          done
          [ -f keys/pub.pem ] && gh release upload "$TAG" keys/pub.pem --repo "${{ github.repository }}" 2>/dev/null || true

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.ref == 'refs/heads/main' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4
