name: Build packages

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches:
      - main
    paths:
      - 'pkgs/**'
      - 'scripts/**'
      - 'etc/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish signed packages to GitHub Releases'
        required: false
        default: false
        type: boolean

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  XBPS_TARGET_ARCH: x86_64
  XBPS_ALLOW_RESTRICTED: yes

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install xbps tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq zstd
          curl -sL "https://repo-default.voidlinux.org/static/xbps-static-latest.x86_64-musl.tar.xz" \
            | sudo tar xJ -C / --strip-components=1

      - name: Configure xbps-uchroot for CI
        run: |
          UCHROOT_BIN="$(command -v xbps-uchroot)"
          if [ -z "$UCHROOT_BIN" ]; then
            echo "xbps-uchroot not found"
            exit 1
          fi
          sudo chown root:root "$UCHROOT_BIN"
          sudo chmod 4755 "$UCHROOT_BIN"

      - name: Clone upstream void-packages
        run: git clone --depth=1 https://github.com/void-linux/void-packages.git

      - name: Build packages
        run: bash scripts/ci-build.sh

      - name: Sign repository
        run: bash scripts/sign-repo.sh
        env:
          XBPS_PRIVKEY: ${{ secrets.XBPS_PRIVKEY }}
          XBPS_PUBKEY: ${{ secrets.XBPS_PUBKEY }}
          XBPS_SIGNEDBY: ${{ secrets.XBPS_SIGNEDBY }}

      - name: Prepare Pages artifact
        run: |
          REPO_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          rm -rf public
          mkdir -p public/keys
          cp -a repo/. public/
          if [ -f keys/pub.pem ]; then
            cp keys/pub.pem public/keys/pub.pem
          else
            echo "keys/pub.pem not found after signing"
            exit 1
          fi
          touch public/.nojekyll
          cat > public/index.html <<EOF
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>XBPS Repository</title>
            <style>
              :root {
                color-scheme: light;
                --bg: #f5f1e8;
                --panel: #fffdf8;
                --text: #1f2933;
                --muted: #52606d;
                --accent: #8f2d56;
                --border: #d9cbb8;
              }
              * { box-sizing: border-box; }
              body {
                margin: 0;
                font-family: Georgia, "Iowan Old Style", serif;
                background: linear-gradient(180deg, #efe7da 0%, var(--bg) 100%);
                color: var(--text);
              }
              main {
                max-width: 760px;
                margin: 48px auto;
                padding: 0 20px;
              }
              .card {
                background: var(--panel);
                border: 1px solid var(--border);
                border-radius: 18px;
                padding: 28px;
                box-shadow: 0 18px 40px rgba(31, 41, 51, 0.08);
              }
              h1 { margin-top: 0; font-size: 2rem; }
              p, li { line-height: 1.6; color: var(--muted); }
              code {
                font-family: "JetBrains Mono", "SFMono-Regular", monospace;
                background: #f3ece2;
                color: var(--text);
                padding: 0.15rem 0.35rem;
                border-radius: 6px;
              }
              pre {
                overflow-x: auto;
                background: #201a1a;
                color: #f7efe4;
                padding: 16px;
                border-radius: 12px;
              }
              a { color: var(--accent); }
            </style>
          </head>
          <body>
            <main>
              <section class="card">
                <h1>XBPS Repository</h1>
                <p>This site serves a raw XBPS repository for Void Linux. The repository root is this URL itself.</p>
                <p>Public key: <a href="keys/pub.pem">keys/pub.pem</a></p>
                <p>Repodata: <a href="x86_64-repodata">x86_64-repodata</a></p>
                <p>Add it on a Void system with:</p>
                <pre><code>sudo mkdir -p /etc/xbps.d
sudo curl -fsSL "$REPO_URL/keys/pub.pem" -o /var/db/xbps/keys/your-repo-key.pem
echo "repository=$REPO_URL" | sudo tee /etc/xbps.d/20-void-repo.conf
sudo xbps-install -S</code></pre>
                <p>Replace <code>your-repo-key.pem</code> with the filename expected for your key fingerprint.</p>
              </section>
            </main>
          </body>
          </html>
          EOF

      - name: Upload built repository artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xbps-repo-${{ github.run_number }}
          path: |
            repo/*.xbps
            repo/*.sig*
            repo/*.fdb*
            repo/*.flist*
            keys/pub.pem
          if-no-files-found: warn

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Publish to GitHub Releases
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true' }}
        run: bash scripts/publish.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.ref == 'refs/heads/main' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
