name: Build packages

on:
  push:
    branches:
      - main
    paths:
      - 'pkgs/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  XBPS_TARGET_ARCH: x86_64
  XBPS_ALLOW_RESTRICTED: yes

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout overlay repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install xbps tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq zstd
          curl -sL "https://repo-default.voidlinux.org/static/xbps-static-latest.x86_64-musl.tar.xz" \
            | sudo tar xJ -C / --strip-components=1
          # xbps-src refuses to run as root — create builder user
          sudo useradd -m builder
          sudo chown -R builder:builder .

      - name: Clone upstream void-packages
        run: |
          if [ ! -d void-packages/.git ]; then
            git clone --depth=1 https://github.com/void-linux/void-packages.git
          fi

      - name: Bootstrap
        run: |
          sudo -Eu builder bash scripts/overlay-packages.sh
          for i in 1 2 3; do
            sudo -Eu builder ./void-packages/xbps-src binary-bootstrap && break
            echo "Bootstrap attempt $i failed, retrying..."
            sleep 5
          done

      - name: Update upstream
        run: |
          sudo -Eu builder git -C void-packages fetch --depth=1 origin master
          sudo -Eu builder git -C void-packages reset --hard origin/master

      - name: Overlay templates
        run: sudo -Eu builder bash scripts/overlay-packages.sh

      - name: Build packages
        run: |
          sudo -Eu builder bash scripts/build.sh
        env:
          XBPS_MAKEJOBS: $(nproc)

      - name: Sign repository
        run: bash scripts/sign-repo.sh
        env:
          XBPS_PRIVKEY: ${{ secrets.XBPS_PRIVKEY }}
          XBPS_PUBKEY: ${{ secrets.XBPS_PUBKEY }}
          XBPS_SIGNEDBY: ${{ secrets.XBPS_SIGNEDBY }}

      - name: Publish to GitHub Releases
        run: bash scripts/publish.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
