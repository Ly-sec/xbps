name: Build packages

on:
  push:
    branches:
      - main
    paths:
      - 'pkgs/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  XBPS_TARGET_ARCH: x86_64
  XBPS_ALLOW_RESTRICTED: yes

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install xbps tools and create builder
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq zstd
          curl -sL "https://repo-default.voidlinux.org/static/xbps-static-latest.x86_64-musl.tar.xz" \
            | sudo tar xJ -C / --strip-components=1
          sudo useradd -m builder
          sudo chown -R builder:builder .

      - name: Build everything
        run: |
          sudo -u builder bash -e <<'SCRIPT'
            set -x
            cd "$GITHUB_WORKSPACE"

            # Clone upstream if needed
            if [ ! -d void-packages/.git ]; then
              git clone --depth=1 https://github.com/void-linux/void-packages.git
            fi

            # Overlay and bootstrap
            bash scripts/overlay-packages.sh
            for i in 1 2 3; do
              ./void-packages/xbps-src binary-bootstrap && break
              echo "Bootstrap attempt $i failed, retrying..."
              sleep 5
            done

            # Update upstream and overlay again (in case reset removed files)
            git -C void-packages fetch --depth=1 origin master
            git -C void-packages reset --hard origin/master
            bash scripts/overlay-packages.sh

            # Build all packages
            XBPS_MAKEJOBS=$(nproc) bash scripts/build.sh
SCRIPT

      - name: Sign repository
        run: bash scripts/sign-repo.sh
        env:
          XBPS_PRIVKEY: ${{ secrets.XBPS_PRIVKEY }}
          XBPS_PUBKEY: ${{ secrets.XBPS_PUBKEY }}
          XBPS_SIGNEDBY: ${{ secrets.XBPS_SIGNEDBY }}

      - name: Publish to GitHub Releases
        run: bash scripts/publish.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
