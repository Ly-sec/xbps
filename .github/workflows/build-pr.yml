name: Build PR packages

on:
  pull_request:
    paths:
      - 'pkgs/**'
      - '.github/workflows/build-pr.yml'

concurrency:
  group: build-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare container
        run: |
          xbps-install -Syu xbps
          xbps-install -y git curl
          useradd -G xbuilder -M builder
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Detect changed packages
        id: detect
        run: |
          CHANGED=$(git diff --name-only "${{ github.event.pull_request.base.sha }}"...HEAD -- 'pkgs/*/template' \
            | sed 's|/template$||' | sort -u || true)
          if [ -z "$CHANGED" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "$CHANGED" > changed-packages.txt
          fi

      - name: Setup void-packages
        if: steps.detect.outputs.changed == 'true'
        run: |
          git clone --depth=1 https://github.com/void-linux/void-packages.git /void-packages
          cd /void-packages
          echo XBPS_BUILD_ENVIRONMENT=void-packages-ci >> etc/conf
          echo XBPS_CHROOT_CMD=uchroot >> etc/conf
          echo XBPS_ALLOW_RESTRICTED=yes >> etc/conf
          chown -R builder:xbuilder .

      - name: Copy overlays and bootstrap
        if: steps.detect.outputs.changed == 'true'
        run: |
          cd /void-packages

          for pkgdir in "$GITHUB_WORKSPACE/pkgs/"*/; do
            [ -d "$pkgdir" ] || continue
            [ -f "$pkgdir/template" ] || continue
            pkg="$(basename "$pkgdir")"
            dst="srcpkgs/$pkg"
            rm -rf "$dst"
            mkdir -p "$dst"
            cp "$pkgdir/template" "$dst/template"
            for extra in INSTALL REMOVE patches files update options; do
              [ -e "$pkgdir/$extra" ] && cp -r "$pkgdir/$extra" "$dst/"
            done
          done

          if [ -f "$GITHUB_WORKSPACE/pkgs/common/shlibs" ]; then
            cat "$GITHUB_WORKSPACE/pkgs/common/shlibs" >> common/shlibs
          fi

          # Run update scripts for git-based packages
          for pkgdir in "$GITHUB_WORKSPACE/pkgs/"*/; do
            [ -f "$pkgdir/update" ] && grep -q '^version=0$' "$pkgdir/template" && {
              echo "Running update for $(basename "$pkgdir")..."
              (cd "$pkgdir" && sh ./update)
              cp "$pkgdir/template" "srcpkgs/$(basename "$pkgdir")/template"
            }
          done

          sudo -Eu builder ./xbps-src binary-bootstrap

      - name: Build changed packages
        if: steps.detect.outputs.changed == 'true'
        run: |
          cd /void-packages
          BUILD_LOG=$(mktemp)
          XBPS_MAKEJOBS=$(nproc)

          while IFS= read -r pkgdir; do
            [ -z "$pkgdir" ] && continue
            pkg="$(basename "$pkgdir")"
            echo "Building $pkg..."
            if ! sudo -Eu builder ./xbps-src -j "$XBPS_MAKEJOBS" pkg "$pkg" 2>&1 | tee -a "$BUILD_LOG"; then
              tail -60 "$BUILD_LOG" > build-error.txt
              exit 1
            fi
          done < "$GITHUB_WORKSPACE/changed-packages.txt"

      - name: Comment build result on PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -s changed-packages.txt ]; then
            exit 0
          fi
          if [ -s build-error.txt ]; then
            gh pr comment "${{ github.event.pull_request.number }}" \
              --repo "${{ github.repository }}" \
              --body "Build failed:\n\n\`\`\`\n$(head -100 build-error.txt)\n\`\`\`" || true
          else
            PACKAGES=$(cat "$GITHUB_WORKSPACE/changed-packages.txt" | sed 's|pkgs/||')
            gh pr comment "${{ github.event.pull_request.number }}" \
              --repo "${{ github.repository }}" \
              --body "Packages built successfully:\n\`\`\`\n$PACKAGES\n\`\`\`" || true
          fi
